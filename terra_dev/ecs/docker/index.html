<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS Fargate Sample</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #232f3e 0%, #1b2838 100%);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            color: #a0aec0;
        }
        .badge {
            display: inline-block;
            background: #ff9900;
            color: #232f3e;
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ECS Fargate Sample</h1>
        <p>This container is running on AWS ECS Fargate</p>
        <span class="badge">Powered by Terraform</span>
    </div>
</body>
</html>
