---
# Global Ansible variables for this standalone sample.
# The inventory discovers the EC2 instance dynamically by AWS tags, and the connection
# plugin uses Systems Manager Session Manager instead of SSH.

ansible_connection: amazon.aws.aws_ssm
ansible_user: ec2-user
ansible_python_interpreter: /usr/bin/python3
ansible_aws_ssm_region: ap-northeast-1

# Some amazon.aws.aws_ssm plugin versions use an S3 bucket for temporary file staging.
# If your local setup requires that behavior, export ANSIBLE_AWS_SSM_BUCKET before running
# the playbook and the value below will be picked up automatically.
ansible_aws_ssm_bucket_name: "{{ lookup('env', 'ANSIBLE_AWS_SSM_BUCKET') | default('', true) }}"

ollama_default_model: qwen2.5:0.5b
ollama_listen_address: 0.0.0.0:11434
ollama_service_user: ollama
ollama_service_group: ollama
ollama_home: /var/lib/ollama
ollama_models_dir: "{{ ollama_home }}/.ollama/models"
